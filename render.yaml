services:
  - type: web
    name: signal-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/signal.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://signal-frontend.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads

  - type: web
    name: signal-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://signal-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://signal-backend.onrender.com/ws
